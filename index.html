<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portal de Apoio e Proteção</title>
    
</head>
<body>

    <div class="flyer">
        <img src="logoFacu.png" alt="Logo Faculdade" class="logo-faculdade">

        <h1>Rede de apoio a criança e a mulher. </h1>
        <h2>Busque orientação, saiba onde denunciar.</h2>
        <p class="subtitle">Você não está sozinho(a)!</p>

        <div class="oqtem">
            <span>📍 Mapa Interativo</span>
            <span>⚖️ Leis</span>
            <span>📞 Canais de Apoio</span>
        </div>

        <div class="qr">
            <div class="crianca">
                <img src="qrcriancareal.png" alt="QR Proteção Criança" class="qr-card">
                <div class="label" style="color: var(--criancalinha);">Proteção à Criança</div>
            </div>

            <div class="mulher">
                <img src="qrcrianca.png" alt="QR Proteção Mulher" class="qr-card">
                <div class="label" style="color: var(--mulherlinha);">Proteção à Mulher</div>
            </div>
        </div>

        <p class="footer-msg">Iniciativa acadêmica de conscientização social.</p>
    </div>

</body>
</html>
